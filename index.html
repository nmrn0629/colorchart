<!doctype html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>チャーム配色プレビュー</title>
  <style>
    @import url("https://fonts.googleapis.com/css2?family=M+PLUS+Rounded+1c:wght@400;500;700&display=swap");

    :root {
      --ink: #263241;
      --paper: #f6f2e8;
      --panel: rgba(255, 255, 255, 0.86);
      --line: rgba(38, 50, 65, 0.16);
      --accent: #c67a4b;
      --shadow: 0 20px 46px rgba(28, 37, 48, 0.14);
      --radius-lg: 22px;
      --radius-md: 14px;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: "M PLUS Rounded 1c", "Hiragino Kaku Gothic ProN", "Yu Gothic", sans-serif;
      color: var(--ink);
      background: url("大理石背景.png") center center / cover no-repeat fixed, #f2ede4;
      padding: 24px;
    }

    .layout {
      max-width: 1200px;
      margin: 0 auto;
      display: grid;
      grid-template-columns: 1.25fr 1fr;
      gap: 24px;
      align-items: start;
    }

    .panel {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: var(--radius-lg);
      box-shadow: var(--shadow);
      backdrop-filter: blur(5px);
    }

    .preview-panel {
      padding: 20px;
    }

    .preview-header {
      display: flex;
      align-items: baseline;
      justify-content: space-between;
      gap: 10px;
      margin-bottom: 14px;
    }

    h1 {
      margin: 0;
      font-size: clamp(1.25rem, 2.2vw, 1.75rem);
      letter-spacing: 0.03em;
    }

    .sub {
      margin: 6px 0 0;
      font-size: 0.92rem;
      opacity: 0.85;
    }

    .tag {
      font-size: 0.75rem;
      border: 1px solid rgba(38, 50, 65, 0.25);
      border-radius: 999px;
      padding: 6px 10px;
      background: rgba(255, 255, 255, 0.75);
      white-space: nowrap;
    }

    .canvas-wrap {
      width: 100%;
      border-radius: var(--radius-md);
      overflow: hidden;
      background: #f9f9f7;
      border: 1px solid rgba(38, 50, 65, 0.12);
      position: relative;
    }

    #previewCanvas {
      width: 100%;
      display: block;
      aspect-ratio: 1080 / 1353;
    }

    .control-panel {
      padding: 18px;
      display: grid;
      gap: 14px;
    }

    .block {
      border: 1px solid var(--line);
      border-radius: var(--radius-md);
      padding: 14px;
      background: rgba(255, 255, 255, 0.8);
    }

    .block h2 {
      margin: 0 0 10px;
      font-size: 0.95rem;
      letter-spacing: 0.05em;
      font-weight: 700;
    }

    .selector-row {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 8px;
      align-items: center;
      margin-bottom: 9px;
    }

    .selector-row:last-child {
      margin-bottom: 0;
    }

    .selector-row label {
      font-size: 0.86rem;
      opacity: 0.88;
    }

    select {
      width: 150px;
      border-radius: 10px;
      border: 1px solid rgba(38, 50, 65, 0.22);
      padding: 6px 10px;
      font: inherit;
      background: white;
      color: #1e2630;
    }

    .swatches {
      display: grid;
      grid-template-columns: repeat(6, minmax(0, 1fr));
      gap: 8px;
      margin-top: 10px;
    }

    .swatch {
      border: none;
      border-radius: 12px;
      aspect-ratio: 1 / 1;
      position: relative;
      cursor: pointer;
      box-shadow:
        inset 0 0 0 1px rgba(255, 255, 255, 0.65),
        0 2px 6px rgba(0, 0, 0, 0.16);
      transition: transform 0.15s ease, box-shadow 0.15s ease;
    }

    .swatch:hover {
      transform: translateY(-2px);
      box-shadow:
        inset 0 0 0 1px rgba(255, 255, 255, 0.75),
        0 6px 12px rgba(0, 0, 0, 0.18);
    }

    .swatch.active::after {
      content: "";
      position: absolute;
      inset: 5px;
      border: 2px solid rgba(255, 255, 255, 0.95);
      border-radius: 9px;
    }

    .metal-options {
      display: flex;
      gap: 8px;
    }

    .metal-btn {
      flex: 1;
      border: 1px solid rgba(38, 50, 65, 0.22);
      border-radius: 10px;
      background: white;
      padding: 8px 10px;
      cursor: pointer;
      font: inherit;
      font-size: 0.88rem;
      transition: all 0.16s ease;
    }

    .metal-btn.active {
      border-color: rgba(38, 50, 65, 0.58);
      box-shadow: inset 0 0 0 1px rgba(38, 50, 65, 0.32);
      background: #fdfbf8;
      transform: translateY(-1px);
    }

    .summary {
      font-size: 0.84rem;
      line-height: 1.65;
      margin: 0;
      background: rgba(244, 241, 231, 0.95);
      border-radius: 10px;
      padding: 10px 12px;
      padding-right: 92px;
      border: 1px solid rgba(38, 50, 65, 0.14);
    }

    .summary-wrap {
      position: relative;
    }

    .summary-copy-btn {
      position: absolute;
      top: 8px;
      right: 8px;
      border: 1px solid rgba(38, 50, 65, 0.2);
      border-radius: 8px;
      background: rgba(255, 255, 255, 0.88);
      color: #1f2a37;
      padding: 4px 10px;
      font: inherit;
      font-size: 0.75rem;
      cursor: pointer;
      transition: all 0.14s ease;
    }

    .summary-copy-btn:hover {
      background: white;
      border-color: rgba(38, 50, 65, 0.36);
    }

    .summary-copy-btn:disabled {
      opacity: 0.72;
      cursor: default;
    }

    .loading {
      position: absolute;
      inset: 0;
      display: grid;
      place-content: center;
      font-size: 0.92rem;
      letter-spacing: 0.04em;
      color: #2f3f55;
      background: rgba(255, 255, 255, 0.8);
    }

    @media (max-width: 980px) {
      body {
        padding: 14px;
      }

      .layout {
        grid-template-columns: 1fr;
      }

      .swatches {
        grid-template-columns: repeat(8, minmax(0, 1fr));
      }
    }

    @media (max-width: 560px) {
      .preview-panel .canvas-wrap {
        width: 66.6667%;
        margin: 0 auto;
      }

      .swatches {
        grid-template-columns: repeat(6, minmax(0, 1fr));
      }

      select {
        width: 132px;
      }
    }
  </style>
</head>
<body>
  <main class="layout">
    <section class="panel preview-panel">
      <div class="preview-header">
        <div>
          <h1>配色プレビュー</h1>
        </div>
        <span class="tag">ベース: ドーナツ2</span>
      </div>
      <div class="canvas-wrap">
        <canvas id="previewCanvas" width="1024" height="1536"></canvas>
        <div id="loading" class="loading">画像を読み込み中...</div>
      </div>
    </section>

    <section class="panel control-panel">
      <div class="block">
        <h2>左のチャーム</h2>
        <div class="metal-options" id="slot0TypeBtns"></div>
        <div class="selector-row" style="margin-top: 10px;">
          <label for="slot0Group">グループ</label>
          <select id="slot0Group"></select>
        </div>
        <div class="swatches" id="slot0Swatches"></div>
      </div>

      <div class="block">
        <h2>右のチャーム</h2>
        <div class="metal-options" id="slot1TypeBtns"></div>
        <div class="selector-row" style="margin-top: 10px;">
          <label for="slot1Group">グループ</label>
          <select id="slot1Group"></select>
        </div>
        <div class="swatches" id="slot1Swatches"></div>
      </div>

      <div class="block">
        <h2>金具カラー</h2>
        <div class="metal-options">
          <button id="metalSilver" class="metal-btn active" type="button">シルバー</button>
          <button id="metalGold" class="metal-btn" type="button">ゴールド</button>
        </div>
      </div>

      <div class="block">
        <h2>ステッチ</h2>
        <div class="metal-options">
          <button id="stitchToggle" class="metal-btn" type="button">ステッチを黒に</button>
        </div>
      </div>

      <div class="summary-wrap">
        <button id="copySummary" class="summary-copy-btn" type="button">コピー</button>
        <p id="summary" class="summary"></p>
      </div>

    </section>
  </main>

  <script>
    const COLORS = [
      { name: "ゴールド", group: "イエロー/オレンジ", hex: "#cb945f" },
      { name: "オレンジ", group: "イエロー/オレンジ", hex: "#e59032" },
      { name: "ライムイエロー", group: "イエロー/オレンジ", hex: "#f1e157" },
      { name: "ペールイエロー", group: "イエロー/オレンジ", hex: "#f5ebb7" },
      { name: "ブリック", group: "イエロー/オレンジ", hex: "#8a5653" },
      { name: "ピスタチオ", group: "イエロー/オレンジ", hex: "#99b482" },

      { name: "ブラック", group: "ベーシック", hex: "#41413d" },
      { name: "グレージュ", group: "ベーシック", hex: "#817469" },
      { name: "ブラウン", group: "ベーシック", hex: "#925a45" },
      { name: "チャコールグレー", group: "ベーシック", hex: "#616162" },
      { name: "アイボリー", group: "ベーシック", hex: "#eee9de" },
      { name: "エトープ", group: "ベーシック", hex: "#a18c71" },

      { name: "ライトブルー", group: "ブルー", hex: "#afece8" },
      { name: "シェルブルー", group: "ブルー", hex: "#6cb9cf" },
      { name: "ミストブルー", group: "ブルー", hex: "#7cacc1" },
      { name: "アイスグレー", group: "ブルー", hex: "#cccecd" },
      { name: "ロイヤルブルー", group: "ブルー", hex: "#4661c6" },
      { name: "ネイビー", group: "ブルー", hex: "#3a4b60" },

      { name: "ピンク", group: "ピンク/レッド", hex: "#f87f8f" },
      { name: "レッド", group: "ピンク/レッド", hex: "#e55a60" },
      { name: "ローズピンク", group: "ピンク/レッド", hex: "#a94174" },
      { name: "パープル", group: "ピンク/レッド", hex: "#a854a4" },
      { name: "ペールピンク", group: "ピンク/レッド", hex: "#e8cfde" },
      { name: "コーラルピンク", group: "ピンク/レッド", hex: "#f0a180" }
    ];

    const GROUPS = ["すべて", ...new Set(COLORS.map((c) => c.group))];

    const CHARM_TYPES = ["donut", "candy", "heart"];
    const CHARM_DEFS = {
      donut: {
        label: "ドーナツ",
        image: "ドーナツ透過.png",
        widthFrac: 0.34,
        mask: { kind: "donut", seedDX: 0.102, seedY: 0.620 },
        stitch: {
          kind: "radial",
          centerDX: 0, centerY: 0.620,
          rx: 0.172, ry: 0.154,
          outerR: 0.875, outerTol: 0.048, outerTolRelax: 0.058,
          innerR: 0.440, innerTol: 0.040, innerTolRelax: 0.050,
          window: { dx: [-0.192, 0.208], y: [0.46, 0.79] },
          minCount: 120
        }
      },
      candy: {
        label: "キャンディ",
        image: "キャンディ透過.png",
        widthFrac: 0.28,
        mask: { kind: "candy", seedDX: 0, seedY: 0.640 },
        stitch: {
          kind: "candy",
          tRange: [0.45, 0.83],
          window: { dx: [-0.098, 0.102], y: [0.45, 0.83] },
          minCount: 80
        }
      },
      heart: {
        label: "ハート",
        image: "ハート透過.png",
        widthFrac: 0.30,
        mask: { kind: "heart", seedDX: 0, seedY: 0.660 },
        stitch: {
          kind: "heart",
          window: { dx: [-0.14, 0.14], y: [0.48, 0.78] },
          insetPasses: 4,
          maxBandPasses: 8,
          minCount: 100
        }
      }
    };

    const state = {
      slots: [
        {
          type: "donut",
          color: COLORS.find((c) => c.name === "ネイビー") || COLORS[0],
          group: "すべて"
        },
        {
          type: "candy",
          color: COLORS.find((c) => c.name === "ライムイエロー") || COLORS[0],
          group: "すべて"
        }
      ],
      metal: "silver",
      stitch: "white"
    };
    const SLOT_CENTER_X = [0.332, 0.698];
    const SLOT_CENTER_Y = 0.640;

    const canvas = document.getElementById("previewCanvas");
    const ctx = canvas.getContext("2d", { willReadFrequently: true });
    const loadingEl = document.getElementById("loading");
    const summaryEl = document.getElementById("summary");
    const copySummaryBtn = document.getElementById("copySummary");

    const slotGroupEls = [document.getElementById("slot0Group"), document.getElementById("slot1Group")];
    const slotSwatchesEls = [document.getElementById("slot0Swatches"), document.getElementById("slot1Swatches")];
    const slotTypeBtnContainers = [document.getElementById("slot0TypeBtns"), document.getElementById("slot1TypeBtns")];
    const slotTypeButtons = [{}, {}];
    const metalSilverBtn = document.getElementById("metalSilver");
    const metalGoldBtn = document.getElementById("metalGold");
    const stitchToggleBtn = document.getElementById("stitchToggle");

    const offscreen = document.createElement("canvas");
    const offCtx = offscreen.getContext("2d", { willReadFrequently: true });
    const grainSourceImage = new Image();
    const grainPatchCanvas = document.createElement("canvas");
    const grainPatchCtx = grainPatchCanvas.getContext("2d", { willReadFrequently: true });
    const silverRingImage = new Image();
    const goldRingImage = new Image();

    let baseData = null;
    let slotMasks = [null, null];
    let slotStitchMasks = [null, null];
    let metalMask = null;
    let stitchBlackMask = null;
    let outlineMask = null;
    let grainPatchData = null;
    let grainPatchWidth = 0;
    let grainPatchHeight = 0;
    let grainMap = null;
    let grainEmbossMap = null;
    let silverRingAsset = null;
    let goldRingAsset = null;
    let colorAreaBounds = null;
    let imageReady = false;

    function clamp(v, min = 0, max = 255) {
      return Math.max(min, Math.min(max, v));
    }

    function hexToRgb(hex) {
      const normalized = hex.replace("#", "");
      const bigint = Number.parseInt(normalized, 16);
      return {
        r: (bigint >> 16) & 255,
        g: (bigint >> 8) & 255,
        b: bigint & 255
      };
    }

    function rgbToHsv(r, g, b) {
      const nr = r / 255;
      const ng = g / 255;
      const nb = b / 255;
      const max = Math.max(nr, ng, nb);
      const min = Math.min(nr, ng, nb);
      const d = max - min;
      let h = 0;
      if (d) {
        if (max === nr) h = ((ng - nb) / d) % 6;
        else if (max === ng) h = (nb - nr) / d + 2;
        else h = (nr - ng) / d + 4;
      }
      h = Math.round(h * 60);
      if (h < 0) h += 360;
      const s = max === 0 ? 0 : d / max;
      const v = max;
      return { h, s, v };
    }

    function buildGroupOptions(selectEl) {
      selectEl.innerHTML = "";
      for (const group of GROUPS) {
        const option = document.createElement("option");
        option.value = group;
        option.textContent = group;
        selectEl.appendChild(option);
      }
    }

    function colorsInGroup(group) {
      if (group === "すべて") return COLORS;
      return COLORS.filter((color) => color.group === group);
    }

    function buildSwatches(container, group, selectedName, onClick) {
      container.innerHTML = "";
      const rows = colorsInGroup(group);
      for (const color of rows) {
        const button = document.createElement("button");
        button.type = "button";
        button.className = "swatch" + (color.name === selectedName ? " active" : "");
        button.style.background = color.hex;
        button.title = color.name;
        button.setAttribute("aria-label", color.name);
        button.addEventListener("click", () => onClick(color));
        container.appendChild(button);
      }
    }

    function updateSummary() {
      const metalName = state.metal === "silver" ? "シルバー" : "ゴールド";
      const stitchName = state.stitch === "white" ? "白" : "黒";
      const parts = state.slots.map((slot) => `${CHARM_DEFS[slot.type].label}「${slot.color.name}」`);
      summaryEl.textContent =
        `現在の組み合わせ: 左${parts[0]} / 右${parts[1]} / 金具「${metalName}」 / ステッチ「${stitchName}」。`;
    }

    async function copySummaryText() {
      const text = summaryEl.textContent.trim();
      if (!text) return;

      let copied = false;
      try {
        if (navigator.clipboard && window.isSecureContext) {
          await navigator.clipboard.writeText(text);
          copied = true;
        }
      } catch {
        copied = false;
      }

      if (!copied) {
        const textarea = document.createElement("textarea");
        textarea.value = text;
        textarea.setAttribute("readonly", "");
        textarea.style.position = "fixed";
        textarea.style.opacity = "0";
        document.body.appendChild(textarea);
        textarea.select();
        try {
          copied = document.execCommand("copy");
        } catch {
          copied = false;
        }
        textarea.remove();
      }

      copySummaryBtn.textContent = copied ? "コピーしました" : "コピー失敗";
      copySummaryBtn.disabled = true;
      window.setTimeout(() => {
        copySummaryBtn.textContent = "コピー";
        copySummaryBtn.disabled = false;
      }, 1200);
    }

    function positiveMod(value, mod) {
      const n = value % mod;
      return n < 0 ? n + mod : n;
    }

    function loadLeatherPatch() {
      let usedFallback = false;
      grainSourceImage.onload = () => {
        const srcW = grainSourceImage.naturalWidth;
        const srcH = grainSourceImage.naturalHeight;
        const sx = Math.floor(srcW * 0.10);
        const sy = Math.floor(srcH * 0.12);
        const sw = Math.max(160, Math.floor(srcW * 0.80));
        const sh = Math.max(160, Math.floor(srcH * 0.76));

        grainPatchWidth = 256;
        grainPatchHeight = 256;
        grainPatchCanvas.width = grainPatchWidth;
        grainPatchCanvas.height = grainPatchHeight;
        grainPatchCtx.drawImage(grainSourceImage, sx, sy, sw, sh, 0, 0, grainPatchWidth, grainPatchHeight);
        grainPatchData = grainPatchCtx.getImageData(0, 0, grainPatchWidth, grainPatchHeight).data;

        if (imageReady) {
          buildLeatherGrainMap(offscreen.width, offscreen.height);
          render();
        }
      };
      grainSourceImage.onerror = () => {
        if (!usedFallback) {
          usedFallback = true;
          grainSourceImage.src = "ブラウン系.jpg";
        }
      };
      grainSourceImage.src = "質感.jpg";
    }

    function buildLeatherGrainMap(width, height) {
      grainMap = new Float32Array(width * height);
      grainEmbossMap = new Float32Array(width * height);

      const hasPatch = !!(grainPatchData && grainPatchWidth > 0 && grainPatchHeight > 0);

      for (let y = 0; y < height; y += 1) {
        for (let x = 0; x < width; x += 1) {
          const idx = y * width + x;

          if (hasPatch) {
            const sx1 = positiveMod((x * 0.95 + y * 0.19) | 0, grainPatchWidth);
            const sy1 = positiveMod((y * 0.92 - x * 0.13) | 0, grainPatchHeight);
            const sx2 = positiveMod((x * 1.43 - y * 0.22) | 0, grainPatchWidth);
            const sy2 = positiveMod((y * 1.31 + x * 0.17) | 0, grainPatchHeight);

            const i1 = (sy1 * grainPatchWidth + sx1) * 4;
            const i2 = (sy2 * grainPatchWidth + sx2) * 4;
            const lum1 = (grainPatchData[i1] * 0.22 + grainPatchData[i1 + 1] * 0.61 + grainPatchData[i1 + 2] * 0.17) / 255;
            const lum2 = (grainPatchData[i2] * 0.22 + grainPatchData[i2 + 1] * 0.61 + grainPatchData[i2 + 2] * 0.17) / 255;

            const center1 = lum1 - 0.5;
            const center2 = lum2 - 0.5;
            const pebble = (1 - Math.abs(center1 * 2)) - 0.5;
            const micro = (center1 - center2) * 0.56;
            grainMap[idx] = center1 * 1.08 + center2 * 0.68 + pebble * 0.62 + micro;
          } else {
            const n1 = Math.sin(x * 0.081 + y * 0.053);
            const n2 = Math.cos(x * 0.132 - y * 0.119);
            const n3 = Math.sin((x + y) * 0.27);
            grainMap[idx] = n1 * 0.23 + n2 * 0.17 + n3 * 0.09;
          }
        }
      }

      for (let y = 1; y < height - 1; y += 1) {
        for (let x = 1; x < width - 1; x += 1) {
          const idx = y * width + x;
          const gx = grainMap[idx + 1] - grainMap[idx - 1];
          const gy = grainMap[idx + width] - grainMap[idx - width];
          grainEmbossMap[idx] = gx * 0.95 + gy * 0.72;
        }
      }
    }

    function computeMaskBounds(mask, width, height) {
      let minX = width;
      let minY = height;
      let maxX = -1;
      let maxY = -1;

      for (let y = 0; y < height; y += 1) {
        for (let x = 0; x < width; x += 1) {
          const idx = y * width + x;
          if (!mask[idx]) continue;
          if (x < minX) minX = x;
          if (y < minY) minY = y;
          if (x > maxX) maxX = x;
          if (y > maxY) maxY = y;
        }
      }

      if (maxX < minX || maxY < minY) return null;
      return { x: minX, y: minY, w: maxX - minX + 1, h: maxY - minY + 1 };
    }

    function mergeBounds(a, b) {
      if (!a && !b) return null;
      if (!a) return b;
      if (!b) return a;
      const x = Math.min(a.x, b.x);
      const y = Math.min(a.y, b.y);
      const maxX = Math.max(a.x + a.w, b.x + b.w);
      const maxY = Math.max(a.y + a.h, b.y + b.h);
      return { x, y, w: maxX - x, h: maxY - y };
    }

    function extractKeyRingAsset(image) {
      const workCanvas = document.createElement("canvas");
      const workCtx = workCanvas.getContext("2d", { willReadFrequently: true });
      workCanvas.width = image.naturalWidth;
      workCanvas.height = image.naturalHeight;
      workCtx.drawImage(image, 0, 0);
      const img = workCtx.getImageData(0, 0, workCanvas.width, workCanvas.height);
      const data = img.data;

      const corners = [
        [1, 1],
        [workCanvas.width - 2, 1],
        [1, workCanvas.height - 2],
        [workCanvas.width - 2, workCanvas.height - 2]
      ];
      let bgR = 0;
      let bgG = 0;
      let bgB = 0;
      for (const [cx, cy] of corners) {
        const ci = (cy * workCanvas.width + cx) * 4;
        bgR += data[ci];
        bgG += data[ci + 1];
        bgB += data[ci + 2];
      }
      bgR /= corners.length;
      bgG /= corners.length;
      bgB /= corners.length;

      let minX = workCanvas.width;
      let minY = workCanvas.height;
      let maxX = -1;
      let maxY = -1;

      for (let y = 0; y < workCanvas.height; y += 1) {
        for (let x = 0; x < workCanvas.width; x += 1) {
          const i = (y * workCanvas.width + x) * 4;
          const dr = data[i] - bgR;
          const dg = data[i + 1] - bgG;
          const db = data[i + 2] - bgB;
          const dist = Math.sqrt(dr * dr + dg * dg + db * db);

          if (dist < 12) {
            data[i + 3] = 0;
          } else if (dist < 28) {
            data[i + 3] = Math.round((dist - 12) / 16 * 255);
          } else {
            data[i + 3] = 255;
            if (x < minX) minX = x;
            if (y < minY) minY = y;
            if (x > maxX) maxX = x;
            if (y > maxY) maxY = y;
          }
        }
      }
      workCtx.putImageData(img, 0, 0);

      if (maxX < minX || maxY < minY) return null;

      const pad = 4;
      const sx = Math.max(0, minX - pad);
      const sy = Math.max(0, minY - pad);
      const sw = Math.min(workCanvas.width - sx, maxX - minX + 1 + pad * 2);
      const sh = Math.min(workCanvas.height - sy, maxY - minY + 1 + pad * 2);

      const out = document.createElement("canvas");
      const outCtx = out.getContext("2d");
      out.width = sw;
      out.height = sh;
      outCtx.drawImage(workCanvas, sx, sy, sw, sh, 0, 0, sw, sh);
      return out;
    }

    function loadKeyRingAssets() {
      silverRingImage.src = "シルバーキーリング.jpg";
      goldRingImage.src = "ゴールドキーリング.jpg";

      silverRingImage.onload = () => {
        silverRingAsset = extractKeyRingAsset(silverRingImage);
        if (imageReady) render();
      };
      silverRingImage.onerror = () => {
        silverRingAsset = null;
        if (imageReady) render();
      };
      goldRingImage.onload = () => {
        goldRingAsset = extractKeyRingAsset(goldRingImage);
        if (imageReady) render();
      };
      goldRingImage.onerror = () => {
        goldRingAsset = null;
        if (imageReady) render();
      };
    }

    function classifyMasks(imageData, width, height) {
      const src = imageData.data;
      slotMasks[0] = new Uint8Array(width * height);
      slotMasks[1] = new Uint8Array(width * height);
      slotStitchMasks[0] = new Uint8Array(width * height);
      slotStitchMasks[1] = new Uint8Array(width * height);
      metalMask = new Uint8Array(width * height);
      stitchBlackMask = new Uint8Array(width * height);
      outlineMask = new Uint8Array(width * height);

      applyCharmMasks(width, height, src);

      smoothMask(slotMasks[0], width, height, 2);
      smoothMask(slotMasks[1], width, height, 2);
      smoothMask(metalMask, width, height, 2);

      const bounds0 = computeMaskBounds(slotMasks[0], width, height);
      const bounds1 = computeMaskBounds(slotMasks[1], width, height);
      colorAreaBounds = mergeBounds(bounds0, bounds1);
      buildInternalStitchMasks(src, width, height);
    }

    function lerp(a, b, t) {
      return a + (b - a) * t;
    }

    function candyHalfWidthByT(t) {
      if (t < 0.12) return lerp(0.028, 0.102, t / 0.12);
      if (t < 0.28) return lerp(0.102, 0.058, (t - 0.12) / 0.16);
      if (t < 0.50) return lerp(0.058, 0.094, (t - 0.28) / 0.22);
      if (t < 0.72) return lerp(0.094, 0.058, (t - 0.50) / 0.22);
      if (t < 0.88) return lerp(0.058, 0.102, (t - 0.72) / 0.16);
      return lerp(0.102, 0.028, (t - 0.88) / 0.12);
    }

    function buildLineBarrier(src, width, height) {
      const barrier = new Uint8Array(width * height);
      for (let idx = 0; idx < barrier.length; idx += 1) {
        const i = idx * 4;
        const r = src[i];
        const g = src[i + 1];
        const b = src[i + 2];
        const lum = 0.2126 * r + 0.7152 * g + 0.0722 * b;
        const spread = Math.max(r, g, b) - Math.min(r, g, b);
        const darkInk = lum < 162 && spread < 44;
        const antialiasInk = lum < 195 && spread < 26 && r < 206 && g < 206 && b < 206;
        if (darkInk || antialiasInk) {
          barrier[idx] = 1;
        }
      }
      return barrier;
    }

    function markOutsideArea(barrier, width, height) {
      const outside = new Uint8Array(width * height);
      const queue = new Int32Array(width * height);
      let head = 0;
      let tail = 0;

      function enqueue(idx) {
        if (!outside[idx] && !barrier[idx]) {
          outside[idx] = 1;
          queue[tail] = idx;
          tail += 1;
        }
      }

      for (let x = 0; x < width; x += 1) {
        enqueue(x);
        enqueue((height - 1) * width + x);
      }
      for (let y = 1; y < height - 1; y += 1) {
        enqueue(y * width);
        enqueue(y * width + (width - 1));
      }

      while (head < tail) {
        const idx = queue[head];
        head += 1;
        const x = idx % width;
        const y = (idx / width) | 0;

        if (x > 0) enqueue(idx - 1);
        if (x < width - 1) enqueue(idx + 1);
        if (y > 0) enqueue(idx - width);
        if (y < height - 1) enqueue(idx + width);
      }

      return outside;
    }

    function findEnclosedSeed(anchorX, anchorY, width, height, barrier, outside) {
      const cx = Math.round(anchorX * width);
      const cy = Math.round(anchorY * height);
      const maxRadius = Math.ceil(Math.max(width, height) * 0.09);

      for (let radius = 0; radius <= maxRadius; radius += 1) {
        const minX = Math.max(1, cx - radius);
        const maxX = Math.min(width - 2, cx + radius);
        const minY = Math.max(1, cy - radius);
        const maxY = Math.min(height - 2, cy + radius);

        for (let x = minX; x <= maxX; x += 1) {
          const topIdx = minY * width + x;
          if (!barrier[topIdx] && !outside[topIdx]) return topIdx;
          const bottomIdx = maxY * width + x;
          if (!barrier[bottomIdx] && !outside[bottomIdx]) return bottomIdx;
        }
        for (let y = minY + 1; y < maxY; y += 1) {
          const leftIdx = y * width + minX;
          if (!barrier[leftIdx] && !outside[leftIdx]) return leftIdx;
          const rightIdx = y * width + maxX;
          if (!barrier[rightIdx] && !outside[rightIdx]) return rightIdx;
        }
      }
      return -1;
    }

    function floodFillRegion(seedIdx, width, height, barrier, outside, targetMask) {
      if (seedIdx < 0 || barrier[seedIdx] || outside[seedIdx]) return 0;

      const queue = new Int32Array(width * height);
      let head = 0;
      let tail = 0;
      let count = 0;

      queue[tail] = seedIdx;
      tail += 1;
      outside[seedIdx] = 1;

      while (head < tail) {
        const idx = queue[head];
        head += 1;
        targetMask[idx] = 1;
        count += 1;

        const x = idx % width;
        const y = (idx / width) | 0;

        if (x > 0) {
          const left = idx - 1;
          if (!barrier[left] && !outside[left]) {
            outside[left] = 1;
            queue[tail] = left;
            tail += 1;
          }
        }
        if (x < width - 1) {
          const right = idx + 1;
          if (!barrier[right] && !outside[right]) {
            outside[right] = 1;
            queue[tail] = right;
            tail += 1;
          }
        }
        if (y > 0) {
          const up = idx - width;
          if (!barrier[up] && !outside[up]) {
            outside[up] = 1;
            queue[tail] = up;
            tail += 1;
          }
        }
        if (y < height - 1) {
          const down = idx + width;
          if (!barrier[down] && !outside[down]) {
            outside[down] = 1;
            queue[tail] = down;
            tail += 1;
          }
        }
      }

      return count;
    }

    function applyApproxCharmMask(slotIdx, type, width, height, barrier) {
      const cx = SLOT_CENTER_X[slotIdx];
      const cy = SLOT_CENTER_Y;
      const mask = slotMasks[slotIdx];
      for (let y = 0; y < height; y += 1) {
        const ny = (y + 0.5) / height;
        for (let x = 0; x < width; x += 1) {
          const nx = (x + 0.5) / width;
          const idx = y * width + x;
          if (barrier[idx]) continue;

          let inside = false;
          if (type === "donut") {
            const dx = (nx - cx) / 0.172;
            const dy = (ny - 0.620) / 0.154;
            const radius = Math.sqrt(dx * dx + dy * dy);
            const angle = Math.atan2(dy, dx);
            const outerWave = 0.965 + 0.018 * Math.sin(angle * 6);
            const innerWave = 0.372 + 0.014 * Math.sin((angle + 0.8) * 4);
            inside =
              Math.abs(nx - cx) < 0.22 &&
              ny > 0.45 && ny < 0.80 &&
              radius < outerWave && radius > innerWave;
          } else if (type === "candy") {
            if (ny >= 0.45 && ny <= 0.83) {
              const t = (ny - 0.45) / 0.38;
              const halfWidth = Math.max(0, candyHalfWidthByT(t) * 0.76 - 0.010);
              inside = Math.abs(nx - cx) < halfWidth;
            }
          } else if (type === "heart") {
            const hx = (nx - cx) / 0.15;
            const hy = -(ny - cy) / 0.14 + 0.35;
            const v = Math.pow(hx * hx + hy * hy - 1, 3) - hx * hx * Math.pow(hy, 3);
            inside = v <= 0;
          }

          if (inside) mask[idx] = 1;
        }
      }
    }

    function applyCharmMasks(width, height, src) {
      slotMasks[0].fill(0);
      slotMasks[1].fill(0);
      const barrier = buildLineBarrier(src, width, height);
      const outside = markOutsideArea(barrier, width, height);
      const area = width * height;

      for (let s = 0; s < 2; s += 1) {
        const type = state.slots[s].type;
        const def = CHARM_DEFS[type].mask;
        const anchorX = SLOT_CENTER_X[s] + def.seedDX;
        const anchorY = def.seedY;
        const seed = findEnclosedSeed(anchorX, anchorY, width, height, barrier, outside);
        const size = floodFillRegion(seed, width, height, barrier, outside, slotMasks[s]);

        if (size < area * 0.01) {
          slotMasks[s].fill(0);
          applyApproxCharmMask(s, type, width, height, barrier);
        }

        insetMaskFromBarrier(slotMasks[s], barrier, width, height, 2);
      }
    }

    function insetMaskFromBarrier(mask, barrier, width, height, passes) {
      for (let pass = 0; pass < passes; pass += 1) {
        const copy = mask.slice();
        for (let y = 1; y < height - 1; y += 1) {
          for (let x = 1; x < width - 1; x += 1) {
            const idx = y * width + x;
            if (!copy[idx]) continue;
            if (
              barrier[idx] ||
              barrier[idx - 1] ||
              barrier[idx + 1] ||
              barrier[idx - width] ||
              barrier[idx + width]
            ) {
              mask[idx] = 0;
            }
          }
        }
      }
    }

function isStitchLikePixel(src, width, height, x, y, relaxed = false) {
      const idx = y * width + x;
      const i = idx * 4;
      const r = src[i];
      const g = src[i + 1];
      const b = src[i + 2];
      const lum = 0.2126 * r + 0.7152 * g + 0.0722 * b;
      const spread = Math.max(r, g, b) - Math.min(r, g, b);
      const neutralLimit = relaxed ? 72 : 56;
      const lowLum = relaxed ? 26 : 34;
      const highLum = relaxed ? 246 : 242;
      if (spread > neutralLimit || lum < lowLum || lum > highLum) {
        return false;
      }
      if (x <= 0 || x >= width - 1 || y <= 0 || y >= height - 1) {
        return true;
      }

      const left = (y * width + (x - 1)) * 4;
      const right = (y * width + (x + 1)) * 4;
      const up = ((y - 1) * width + x) * 4;
      const down = ((y + 1) * width + x) * 4;
      const lumLeft = 0.2126 * src[left] + 0.7152 * src[left + 1] + 0.0722 * src[left + 2];
      const lumRight = 0.2126 * src[right] + 0.7152 * src[right + 1] + 0.0722 * src[right + 2];
      const lumUp = 0.2126 * src[up] + 0.7152 * src[up + 1] + 0.0722 * src[up + 2];
      const lumDown = 0.2126 * src[down] + 0.7152 * src[down + 1] + 0.0722 * src[down + 2];
      const local = (lumLeft + lumRight + lumUp + lumDown) / 4;
      const contrast = Math.abs(lum - local);
      return contrast > (relaxed ? 3.4 : 6.2);
    }

    function hasMaskNeighbor(mask, x, y, width, height, radius) {
      for (let d = 1; d <= radius; d += 1) {
        if (y - d >= 0 && mask[(y - d) * width + x]) return true;
        if (y + d < height && mask[(y + d) * width + x]) return true;
        if (x - d >= 0 && mask[y * width + (x - d)]) return true;
        if (x + d < width && mask[y * width + (x + d)]) return true;
      }
      return false;
    }

    function detectDonutStitch(slotIdx, src, width, height, relaxed) {
      const mask = slotMasks[slotIdx];
      const stitchMask = slotStitchMasks[slotIdx];
      const cfg = CHARM_DEFS.donut.stitch;
      const cx = SLOT_CENTER_X[slotIdx] + cfg.centerDX;
      const cy = cfg.centerY;
      const outerTol = relaxed ? cfg.outerTolRelax : cfg.outerTol;
      const innerTol = relaxed ? cfg.innerTolRelax : cfg.innerTol;
      let count = 0;
      for (let y = 0; y < height; y += 1) {
        const ny = (y + 0.5) / height;
        for (let x = 0; x < width; x += 1) {
          const idx = y * width + x;
          if (!mask[idx] || stitchMask[idx]) continue;
          const nx = (x + 0.5) / width;
          const dxn = nx - cx;
          if (dxn < cfg.window.dx[0] || dxn > cfg.window.dx[1]) continue;
          if (ny < cfg.window.y[0] || ny > cfg.window.y[1]) continue;
          const dx = dxn / cfg.rx;
          const dy = (ny - cy) / cfg.ry;
          const radius = Math.sqrt(dx * dx + dy * dy);
          const nearOuter = Math.abs(radius - cfg.outerR) < outerTol;
          const nearInner = Math.abs(radius - cfg.innerR) < innerTol;
          if (!nearOuter && !nearInner) continue;
          if (!isStitchLikePixel(src, width, height, x, y, relaxed)) continue;
          stitchMask[idx] = 1;
          count += 1;
        }
      }
      return count;
    }

    function detectCandyStitch(slotIdx, src, width, height, relaxed) {
      const mask = slotMasks[slotIdx];
      const stitchMask = slotStitchMasks[slotIdx];
      const cfg = CHARM_DEFS.candy.stitch;
      const cx = SLOT_CENTER_X[slotIdx];
      let count = 0;
      for (let y = 0; y < height; y += 1) {
        const ny = (y + 0.5) / height;
        if (ny < cfg.tRange[0] || ny > cfg.tRange[1]) continue;
        const t = (ny - cfg.tRange[0]) / (cfg.tRange[1] - cfg.tRange[0]);
        const halfWidth = Math.max(0, candyHalfWidthByT(t) * 0.76 - 0.010);
        const stitchOffset = Math.max(0, halfWidth - 0.020);
        const tolerance = (relaxed ? 0.012 : 0.010) + halfWidth * (relaxed ? 0.08 : 0.06);
        for (let x = 0; x < width; x += 1) {
          const idx = y * width + x;
          if (!mask[idx] || stitchMask[idx]) continue;
          const nx = (x + 0.5) / width;
          const dxn = nx - cx;
          if (dxn < cfg.window.dx[0] || dxn > cfg.window.dx[1]) continue;
          const edgeDistance = Math.abs(Math.abs(dxn) - stitchOffset);
          if (edgeDistance > tolerance) continue;
          if (!isStitchLikePixel(src, width, height, x, y, relaxed)) continue;
          stitchMask[idx] = 1;
          count += 1;
        }
      }
      return count;
    }

    function erodeMask(mask, width, height, passes) {
      const result = new Uint8Array(mask);
      for (let pass = 0; pass < passes; pass += 1) {
        const copy = result.slice();
        for (let y = 1; y < height - 1; y += 1) {
          for (let x = 1; x < width - 1; x += 1) {
            const idx = y * width + x;
            if (!copy[idx]) continue;
            if (!copy[idx - 1] || !copy[idx + 1] || !copy[idx - width] || !copy[idx + width]) {
              result[idx] = 0;
            }
          }
        }
      }
      return result;
    }

    function detectHeartStitch(slotIdx, src, width, height, relaxed) {
      const mask = slotMasks[slotIdx];
      const stitchMask = slotStitchMasks[slotIdx];
      const cfg = CHARM_DEFS.heart.stitch;
      const cx = SLOT_CENTER_X[slotIdx];
      const innerEroded = erodeMask(mask, width, height, cfg.insetPasses);
      const outerBand = erodeMask(mask, width, height, cfg.maxBandPasses);
      let count = 0;
      for (let y = 0; y < height; y += 1) {
        const ny = (y + 0.5) / height;
        if (ny < cfg.window.y[0] || ny > cfg.window.y[1]) continue;
        for (let x = 0; x < width; x += 1) {
          const idx = y * width + x;
          if (stitchMask[idx]) continue;
          if (!innerEroded[idx] || outerBand[idx]) continue;
          const nx = (x + 0.5) / width;
          const dxn = nx - cx;
          if (dxn < cfg.window.dx[0] || dxn > cfg.window.dx[1]) continue;
          if (!isStitchLikePixel(src, width, height, x, y, relaxed)) continue;
          stitchMask[idx] = 1;
          count += 1;
        }
      }

      if (count >= cfg.minCount) return count;

      const R = 6;
      for (let y = 0; y < height; y += 1) {
        const ny = (y + 0.5) / height;
        if (ny < cfg.window.y[0] || ny > cfg.window.y[1]) continue;
        for (let x = 0; x < width; x += 1) {
          const idx = y * width + x;
          if (stitchMask[idx] || mask[idx]) continue;
          const i = idx * 4;
          if (src[i + 3] < 32) continue;
          const lum = 0.2126 * src[i] + 0.7152 * src[i + 1] + 0.0722 * src[i + 2];
          if (lum >= 170) continue;
          const nx = (x + 0.5) / width;
          const dxn = nx - cx;
          if (dxn < cfg.window.dx[0] || dxn > cfg.window.dx[1]) continue;
          let up = false, down = false, left = false, right = false;
          for (let d = 1; d <= R; d += 1) {
            if (!up && y - d >= 0 && mask[(y - d) * width + x]) up = true;
            if (!down && y + d < height && mask[(y + d) * width + x]) down = true;
            if (!left && x - d >= 0 && mask[y * width + (x - d)]) left = true;
            if (!right && x + d < width && mask[y * width + (x + d)]) right = true;
          }
          if ((up && down) || (left && right)) {
            stitchMask[idx] = 1;
            count += 1;
          }
        }
      }
      return count;
    }

    function detectSlotStitch(slotIdx, src, width, height) {
      const type = state.slots[slotIdx].type;
      const cfg = CHARM_DEFS[type].stitch;
      let count;
      if (cfg.kind === "radial") {
        count = detectDonutStitch(slotIdx, src, width, height, false);
        if (count < cfg.minCount) {
          count = detectDonutStitch(slotIdx, src, width, height, true);
        }
      } else if (cfg.kind === "candy") {
        count = detectCandyStitch(slotIdx, src, width, height, false);
        if (count < cfg.minCount) {
          count = detectCandyStitch(slotIdx, src, width, height, true);
        }
      } else if (cfg.kind === "heart") {
        count = detectHeartStitch(slotIdx, src, width, height, false);
      }
      return count;
    }

    function buildInternalStitchMasks(src, width, height) {
      slotStitchMasks[0].fill(0);
      slotStitchMasks[1].fill(0);
      detectSlotStitch(0, src, width, height);
      detectSlotStitch(1, src, width, height);

      const GAP_R = 6;
      for (let y = 0; y < height; y += 1) {
        for (let x = 0; x < width; x += 1) {
          const idx = y * width + x;
          if (slotStitchMasks[0][idx] || slotStitchMasks[1][idx]) continue;
          if (slotMasks[0][idx] || slotMasks[1][idx]) continue;
          const i = idx * 4;
          if (src[i + 3] < 32) continue;
          const lum = 0.2126 * src[i] + 0.7152 * src[i + 1] + 0.0722 * src[i + 2];
          if (lum >= 170) continue;
          for (let s = 0; s < 2; s += 1) {
            const type = state.slots[s].type;
            if (type !== "donut" && type !== "candy") continue;
            const m = slotMasks[s];
            let up = false, down = false, left = false, right = false;
            for (let d = 1; d <= GAP_R; d += 1) {
              if (!up && y - d >= 0 && m[(y - d) * width + x]) up = true;
              if (!down && y + d < height && m[(y + d) * width + x]) down = true;
              if (!left && x - d >= 0 && m[y * width + (x - d)]) left = true;
              if (!right && x + d < width && m[y * width + (x + d)]) right = true;
            }
            if ((up && down) || (left && right)) {
              slotStitchMasks[s][idx] = 1;
              break;
            }
          }
        }
      }

      removeIsolatedStitchPixels(slotStitchMasks[0], width, height);
      removeIsolatedStitchPixels(slotStitchMasks[1], width, height);

      stitchBlackMask.fill(0);
      for (let idx = 0; idx < stitchBlackMask.length; idx += 1) {
        if (slotStitchMasks[0][idx] || slotStitchMasks[1][idx]) stitchBlackMask[idx] = 1;
      }

      outlineMask.fill(0);
      const OR = 3;
      const anyCharmMask = (idx) => slotMasks[0][idx] || slotMasks[1][idx];
      for (let y = 0; y < height; y += 1) {
        for (let x = 0; x < width; x += 1) {
          const idx = y * width + x;
          if (slotStitchMasks[0][idx] || slotStitchMasks[1][idx]) continue;
          if (anyCharmMask(idx) || metalMask[idx]) continue;
          const i = idx * 4;
          if (src[i + 3] < 16) continue;
          const lum = 0.2126 * src[i] + 0.7152 * src[i + 1] + 0.0722 * src[i + 2];
          if (lum >= 200) continue;
          if (hasMaskNeighbor(slotMasks[0], x, y, width, height, OR) ||
              hasMaskNeighbor(slotMasks[1], x, y, width, height, OR)) {
            outlineMask[idx] = 1;
          }
        }
      }

      for (let pass = 0; pass < 3; pass += 1) {
        const prev = stitchBlackMask.slice();
        for (let y = 0; y < height; y += 1) {
          for (let x = 0; x < width; x += 1) {
            const idx = y * width + x;
            if (!prev[idx]) continue;
            const neighbors = [
              x > 0 ? idx - 1 : -1,
              x < width - 1 ? idx + 1 : -1,
              y > 0 ? idx - width : -1,
              y < height - 1 ? idx + width : -1
            ];
            for (const n of neighbors) {
              if (n < 0 || stitchBlackMask[n]) continue;
              const ni = n * 4;
              const nlum = 0.2126 * src[ni] + 0.7152 * src[ni + 1] + 0.0722 * src[ni + 2];
              if (nlum < 240) stitchBlackMask[n] = 1;
            }
          }
        }
      }
    }

    function removeIsolatedStitchPixels(mask, width, height) {
      const copy = mask.slice();
      for (let y = 1; y < height - 1; y += 1) {
        for (let x = 1; x < width - 1; x += 1) {
          const idx = y * width + x;
          if (!copy[idx]) continue;
          let neighbors = 0;
          for (let oy = -1; oy <= 1; oy += 1) {
            for (let ox = -1; ox <= 1; ox += 1) {
              if (ox === 0 && oy === 0) continue;
              neighbors += copy[(y + oy) * width + (x + ox)];
            }
          }
          if (neighbors <= 1) {
            mask[idx] = 0;
          }
        }
      }
    }

    function smoothMask(mask, width, height, rounds) {
      for (let round = 0; round < rounds; round += 1) {
        const copy = mask.slice();
        for (let y = 1; y < height - 1; y += 1) {
          for (let x = 1; x < width - 1; x += 1) {
            const idx = y * width + x;
            let sum = 0;
            for (let oy = -1; oy <= 1; oy += 1) {
              for (let ox = -1; ox <= 1; ox += 1) {
                sum += copy[(y + oy) * width + (x + ox)];
              }
            }
            if (sum >= 5) mask[idx] = 1;
            if (sum <= 2) mask[idx] = 0;
          }
        }
      }
    }

    function leatherTone(base, target, idx) {
      const lum = (0.2126 * base.r + 0.7152 * base.g + 0.0722 * base.b) / 255;
      const spread = (Math.max(base.r, base.g, base.b) - Math.min(base.r, base.g, base.b)) / 255;
      const grain = grainMap ? grainMap[idx] : 0;
      const emboss = grainEmbossMap ? grainEmbossMap[idx] : 0;
      const factor = 0.80 + lum * 0.20 + spread * 0.10 + grain * 0.28;
      const lift = grain * 16;
      const bump = emboss * 12;
      return {
        r: clamp(target.r * factor + lift * 0.50 + bump * 1.05),
        g: clamp(target.g * factor + lift * 0.40 + bump * 0.90),
        b: clamp(target.b * factor - lift * 0.24 - bump * 0.62)
      };
    }

    function metalTone(base, mode) {
      const lum = (0.2126 * base.r + 0.7152 * base.g + 0.0722 * base.b) / 255;
      const highlight = mode === "silver"
        ? { r: 243, g: 246, b: 252 }
        : { r: 236, g: 223, b: 192 };
      const shadow = mode === "silver"
        ? { r: 109, g: 118, b: 130 }
        : { r: 117, g: 100, b: 72 };
      const mix = 0.18 + lum * 0.82;
      let r = shadow.r * (1 - mix) + highlight.r * mix;
      let g = shadow.g * (1 - mix) + highlight.g * mix;
      let b = shadow.b * (1 - mix) + highlight.b * mix;

      if (mode === "gold") {
        const mute = 0.14;
        const gray = (r + g + b) / 3;
        r = r * (1 - mute) + gray * mute;
        g = g * (1 - mute) + gray * mute;
        b = b * (1 - mute) + gray * mute;
      }
      return { r: clamp(r), g: clamp(g), b: clamp(b) };
    }

    function drawSelectedKeyRing(width, height) {
      const asset = state.metal === "silver" ? silverRingAsset : goldRingAsset;
      if (!asset) return;

      const margin = Math.max(8, Math.round(Math.min(width, height) * 0.012));
      const topLimit = colorAreaBounds
        ? Math.max(margin * 2, colorAreaBounds.y - margin)
        : Math.round(height * 0.24);
      const maxDrawHeight = topLimit - margin;
      if (maxDrawHeight < 20) return;

      const maxDrawWidth = Math.round(width * 0.34);
      const scale = Math.min(
        maxDrawWidth / asset.width,
        maxDrawHeight / asset.height
      );
      const drawW = Math.max(24, Math.round(asset.width * scale));
      const drawH = Math.max(20, Math.round(asset.height * scale));

      const targetX = Math.round((width - drawW) / 2);
      let targetY = Math.round((topLimit - drawH) / 2);
      targetY = Math.max(margin, targetY);
      if (targetY + drawH > topLimit) {
        targetY = Math.max(margin, topLimit - drawH);
      }

      ctx.drawImage(asset, targetX, targetY, drawW, drawH);
    }

    function stitchPixelTone(base) {
      const lum = (0.2126 * base.r + 0.7152 * base.g + 0.0722 * base.b) / 255;
      const tone = 6 + lum * 14;
      return { r: clamp(tone), g: clamp(tone), b: clamp(tone + 1) };
    }

    function render() {
      if (!imageReady || !baseData) return;

      const width = offscreen.width;
      const height = offscreen.height;
      const src = baseData.data;
      const out = new ImageData(width, height);
      const dst = out.data;
      const slotTargets = [hexToRgb(state.slots[0].color.hex), hexToRgb(state.slots[1].color.hex)];
      const hasRingAsset = state.metal === "silver" ? !!silverRingAsset : !!goldRingAsset;

      for (let idx = 0; idx < slotMasks[0].length; idx += 1) {
        const i = idx * 4;
        const base = { r: src[i], g: src[i + 1], b: src[i + 2] };
        let result = { ...base };

        if (slotMasks[0][idx]) {
          result = leatherTone(base, slotTargets[0], idx);
        } else if (slotMasks[1][idx]) {
          result = leatherTone(base, slotTargets[1], idx);
        } else if (metalMask[idx]) {
          result = metalTone(base, state.metal);
        }

        let alphaOut = src[i + 3];
        const inStitch = stitchBlackMask[idx];
        if (inStitch) {
          result = state.stitch === "white"
            ? { r: 245, g: 245, b: 244 }
            : { r: 18, g: 18, b: 20 };
          if (alphaOut > 0) alphaOut = 255;
        } else if (outlineMask[idx]) {
          result = { r: 18, g: 18, b: 20 };
          alphaOut = 255;
        }

        dst[i] = result.r;
        dst[i + 1] = result.g;
        dst[i + 2] = result.b;
        dst[i + 3] = alphaOut;
      }

      ctx.putImageData(out, 0, 0);
      if (hasRingAsset && colorAreaBounds) {
        drawSelectedKeyRing(width, height);
      }
    }

    function initControls() {
      for (let s = 0; s < 2; s += 1) {
        buildGroupOptions(slotGroupEls[s]);
        slotGroupEls[s].value = state.slots[s].group;
      }

      function refreshTypeButtons() {
        for (let s = 0; s < 2; s += 1) {
          for (const type of CHARM_TYPES) {
            const btn = slotTypeButtons[s][type];
            btn.classList.toggle("active", state.slots[s].type === type);
          }
        }
      }

      function rerenderSwatches() {
        for (let s = 0; s < 2; s += 1) {
          const slotIdx = s;
          buildSwatches(slotSwatchesEls[s], state.slots[s].group, state.slots[s].color.name, (color) => {
            state.slots[slotIdx].color = color;
            rerenderSwatches();
            updateSummary();
            render();
          });
        }
      }

      for (let s = 0; s < 2; s += 1) {
        const slotIdx = s;
        const container = slotTypeBtnContainers[s];
        container.innerHTML = "";
        for (const type of CHARM_TYPES) {
          const btn = document.createElement("button");
          btn.type = "button";
          btn.className = "metal-btn";
          btn.textContent = CHARM_DEFS[type].label;
          btn.addEventListener("click", () => {
            if (!imageReady) return;
            if (state.slots[slotIdx].type === type) return;
            state.slots[slotIdx].type = type;
            refreshTypeButtons();
            composeBase();
            updateSummary();
            render();
          });
          container.appendChild(btn);
          slotTypeButtons[s][type] = btn;
        }
        slotGroupEls[s].addEventListener("change", () => {
          state.slots[slotIdx].group = slotGroupEls[slotIdx].value;
          rerenderSwatches();
        });
      }

      metalSilverBtn.addEventListener("click", () => {
        state.metal = "silver";
        metalSilverBtn.classList.add("active");
        metalGoldBtn.classList.remove("active");
        updateSummary();
        render();
      });

      metalGoldBtn.addEventListener("click", () => {
        state.metal = "gold";
        metalGoldBtn.classList.add("active");
        metalSilverBtn.classList.remove("active");
        updateSummary();
        render();
      });

      stitchToggleBtn.addEventListener("click", () => {
        state.stitch = state.stitch === "white" ? "black" : "white";
        stitchToggleBtn.textContent = state.stitch === "white" ? "ステッチを黒に" : "ステッチを白に";
        stitchToggleBtn.classList.toggle("active", state.stitch === "black");
        updateSummary();
        render();
      });

      copySummaryBtn.addEventListener("click", () => {
        copySummaryText();
      });

      refreshTypeButtons();
      rerenderSwatches();
      updateSummary();
    }

    function loadImage(src) {
      return new Promise((resolve, reject) => {
        const img = new Image();
        img.onload = () => resolve(img);
        img.onerror = reject;
        img.src = src;
      });
    }

    const charmImages = { donut: null, candy: null, heart: null };

    function composeBase() {
      if (!charmImages.donut || !charmImages.candy || !charmImages.heart) return;
      const W = 1080;
      const H = 1353;
      offscreen.width = W;
      offscreen.height = H;
      canvas.width = W;
      canvas.height = H;
      offCtx.fillStyle = "#ffffff";
      offCtx.fillRect(0, 0, W, H);

      for (let s = 0; s < 2; s += 1) {
        const slot = state.slots[s];
        const def = CHARM_DEFS[slot.type];
        const img = charmImages[slot.type];
        const w = W * def.widthFrac;
        const h = img.naturalHeight * (w / img.naturalWidth);
        offCtx.drawImage(img, W * SLOT_CENTER_X[s] - w / 2, H * SLOT_CENTER_Y - h / 2, w, h);
      }

      baseData = offCtx.getImageData(0, 0, W, H);
      classifyMasks(baseData, W, H);
      buildLeatherGrainMap(W, H);
    }

    function initImage() {
      Promise.all([
        loadImage(CHARM_DEFS.donut.image),
        loadImage(CHARM_DEFS.candy.image),
        loadImage(CHARM_DEFS.heart.image),
      ])
        .then(([donutImg, candyImg, heartImg]) => {
          charmImages.donut = donutImg;
          charmImages.candy = candyImg;
          charmImages.heart = heartImg;
          composeBase();
          imageReady = true;
          loadingEl.style.display = "none";
          render();
        })
        .catch(() => {
          loadingEl.textContent = "画像の読み込みに失敗しました。ファイル名をご確認ください。";
        });
    }

    initControls();
    loadLeatherPatch();
    loadKeyRingAssets();
    initImage();
  </script>
</body>
</html>
