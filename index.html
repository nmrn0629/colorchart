<!doctype html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>チャーム配色プレビュー</title>
  <style>
    @import url("https://fonts.googleapis.com/css2?family=M+PLUS+Rounded+1c:wght@400;500;700&display=swap");

    :root {
      --ink: #263241;
      --paper: #f6f2e8;
      --panel: rgba(255, 255, 255, 0.86);
      --line: rgba(38, 50, 65, 0.16);
      --accent: #c67a4b;
      --shadow: 0 20px 46px rgba(28, 37, 48, 0.14);
      --radius-lg: 22px;
      --radius-md: 14px;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: "M PLUS Rounded 1c", "Hiragino Kaku Gothic ProN", "Yu Gothic", sans-serif;
      color: var(--ink);
      background:
        radial-gradient(130% 75% at 10% 0%, rgba(255, 221, 171, 0.58), transparent 65%),
        radial-gradient(120% 90% at 100% 15%, rgba(171, 213, 227, 0.44), transparent 60%),
        linear-gradient(135deg, #eee5d6 0%, #f7f4ee 42%, #e9f0f3 100%);
      padding: 24px;
    }

    .layout {
      max-width: 1200px;
      margin: 0 auto;
      display: grid;
      grid-template-columns: 1.25fr 1fr;
      gap: 24px;
      align-items: start;
    }

    .panel {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: var(--radius-lg);
      box-shadow: var(--shadow);
      backdrop-filter: blur(5px);
    }

    .preview-panel {
      padding: 20px;
    }

    .preview-header {
      display: flex;
      align-items: baseline;
      justify-content: space-between;
      gap: 10px;
      margin-bottom: 14px;
    }

    h1 {
      margin: 0;
      font-size: clamp(1.25rem, 2.2vw, 1.75rem);
      letter-spacing: 0.03em;
    }

    .sub {
      margin: 6px 0 0;
      font-size: 0.92rem;
      opacity: 0.85;
    }

    .tag {
      font-size: 0.75rem;
      border: 1px solid rgba(38, 50, 65, 0.25);
      border-radius: 999px;
      padding: 6px 10px;
      background: rgba(255, 255, 255, 0.75);
      white-space: nowrap;
    }

    .canvas-wrap {
      width: 100%;
      border-radius: var(--radius-md);
      overflow: hidden;
      background: #f9f9f7;
      border: 1px solid rgba(38, 50, 65, 0.12);
      position: relative;
    }

    #previewCanvas {
      width: 100%;
      display: block;
      aspect-ratio: 1080 / 1353;
    }

    .control-panel {
      padding: 18px;
      display: grid;
      gap: 14px;
    }

    .block {
      border: 1px solid var(--line);
      border-radius: var(--radius-md);
      padding: 14px;
      background: rgba(255, 255, 255, 0.8);
    }

    .block h2 {
      margin: 0 0 10px;
      font-size: 0.95rem;
      letter-spacing: 0.05em;
      font-weight: 700;
    }

    .selector-row {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 8px;
      align-items: center;
      margin-bottom: 9px;
    }

    .selector-row:last-child {
      margin-bottom: 0;
    }

    .selector-row label {
      font-size: 0.86rem;
      opacity: 0.88;
    }

    select {
      width: 150px;
      border-radius: 10px;
      border: 1px solid rgba(38, 50, 65, 0.22);
      padding: 6px 10px;
      font: inherit;
      background: white;
      color: #1e2630;
    }

    .swatches {
      display: grid;
      grid-template-columns: repeat(6, minmax(0, 1fr));
      gap: 8px;
      margin-top: 10px;
    }

    .swatch {
      border: none;
      border-radius: 12px;
      aspect-ratio: 1 / 1;
      position: relative;
      cursor: pointer;
      box-shadow:
        inset 0 0 0 1px rgba(255, 255, 255, 0.65),
        0 2px 6px rgba(0, 0, 0, 0.16);
      transition: transform 0.15s ease, box-shadow 0.15s ease;
    }

    .swatch:hover {
      transform: translateY(-2px);
      box-shadow:
        inset 0 0 0 1px rgba(255, 255, 255, 0.75),
        0 6px 12px rgba(0, 0, 0, 0.18);
    }

    .swatch.active::after {
      content: "";
      position: absolute;
      inset: 5px;
      border: 2px solid rgba(255, 255, 255, 0.95);
      border-radius: 9px;
    }

    .metal-options {
      display: flex;
      gap: 8px;
    }

    .metal-btn {
      flex: 1;
      border: 1px solid rgba(38, 50, 65, 0.22);
      border-radius: 10px;
      background: white;
      padding: 8px 10px;
      cursor: pointer;
      font: inherit;
      font-size: 0.88rem;
      transition: all 0.16s ease;
    }

    .metal-btn.active {
      border-color: rgba(38, 50, 65, 0.58);
      box-shadow: inset 0 0 0 1px rgba(38, 50, 65, 0.32);
      background: #fdfbf8;
      transform: translateY(-1px);
    }

    .summary {
      font-size: 0.84rem;
      line-height: 1.65;
      margin: 0;
      background: rgba(244, 241, 231, 0.95);
      border-radius: 10px;
      padding: 10px 12px;
      border: 1px solid rgba(38, 50, 65, 0.14);
    }

    .charts {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 8px;
    }

    .charts img {
      width: 100%;
      display: block;
      border-radius: 10px;
      border: 1px solid rgba(38, 50, 65, 0.15);
    }

    .loading {
      position: absolute;
      inset: 0;
      display: grid;
      place-content: center;
      font-size: 0.92rem;
      letter-spacing: 0.04em;
      color: #2f3f55;
      background: rgba(255, 255, 255, 0.8);
    }

    @media (max-width: 980px) {
      body {
        padding: 14px;
      }

      .layout {
        grid-template-columns: 1fr;
      }

      .swatches {
        grid-template-columns: repeat(8, minmax(0, 1fr));
      }
    }

    @media (max-width: 560px) {
      .swatches {
        grid-template-columns: repeat(6, minmax(0, 1fr));
      }

      select {
        width: 132px;
      }
    }
  </style>
</head>
<body>
  <main class="layout">
    <section class="panel preview-panel">
      <div class="preview-header">
        <div>
          <h1>ドーナツ x キャンディ 配色プレビュー</h1>
          <p class="sub">ヴォーエプソン風のシボ感を残して、色組み合わせを確認できます。</p>
        </div>
        <span class="tag">ベース: ステッチドーナツ</span>
      </div>
      <div class="canvas-wrap">
        <canvas id="previewCanvas" width="1024" height="1536"></canvas>
        <div id="loading" class="loading">画像を読み込み中...</div>
      </div>
    </section>

    <section class="panel control-panel">
      <div class="block">
        <h2>カラー選択</h2>
        <div class="selector-row">
          <label for="dogGroup">ドーナツ / グループ</label>
          <select id="dogGroup"></select>
        </div>
        <div class="swatches" id="dogSwatches"></div>
        <div class="selector-row" style="margin-top: 10px;">
          <label for="boneGroup">キャンディ / グループ</label>
          <select id="boneGroup"></select>
        </div>
        <div class="swatches" id="boneSwatches"></div>
      </div>

      <div class="block">
        <h2>金具カラー</h2>
        <div class="metal-options">
          <button id="metalSilver" class="metal-btn active" type="button">シルバー</button>
          <button id="metalGold" class="metal-btn" type="button">ゴールド</button>
        </div>
      </div>

      <p id="summary" class="summary"></p>

      <div class="block">
        <h2>カラーチャート（参照）</h2>
        <div class="charts">
          <img src="イエロー系.jpg" alt="イエロー系カラーチャート">
          <img src="ブラウン系.jpg" alt="ブラウン系カラーチャート">
          <img src="ブルー系.jpg" alt="ブルー系カラーチャート">
          <img src="レッド系.jpg" alt="レッド系カラーチャート">
        </div>
      </div>
    </section>
  </main>

  <script>
    const COLORS = [
      { name: "ゴールド", group: "イエロー/オレンジ", hex: "#cb945f" },
      { name: "オレンジ", group: "イエロー/オレンジ", hex: "#e59032" },
      { name: "ライムイエロー", group: "イエロー/オレンジ", hex: "#f1e157" },
      { name: "ペールイエロー", group: "イエロー/オレンジ", hex: "#f5ebb7" },
      { name: "ブリック", group: "イエロー/オレンジ", hex: "#8a5653" },
      { name: "ピスタチオ", group: "イエロー/オレンジ", hex: "#99b482" },

      { name: "ブラック", group: "ベーシック", hex: "#41413d" },
      { name: "グレージュ", group: "ベーシック", hex: "#817469" },
      { name: "ブラウン", group: "ベーシック", hex: "#925a45" },
      { name: "チャコールグレー", group: "ベーシック", hex: "#616162" },
      { name: "アイボリー", group: "ベーシック", hex: "#eee9de" },
      { name: "エトープ", group: "ベーシック", hex: "#a18c71" },

      { name: "ライトブルー", group: "ブルー", hex: "#afece8" },
      { name: "シェルブルー", group: "ブルー", hex: "#6cb9cf" },
      { name: "ミストブルー", group: "ブルー", hex: "#7cacc1" },
      { name: "アイスグレー", group: "ブルー", hex: "#cccecd" },
      { name: "ロイヤルブルー", group: "ブルー", hex: "#4661c6" },
      { name: "ネイビー", group: "ブルー", hex: "#3a4b60" },

      { name: "ピンク", group: "ピンク/レッド", hex: "#f87f8f" },
      { name: "レッド", group: "ピンク/レッド", hex: "#e55a60" },
      { name: "ローズピンク", group: "ピンク/レッド", hex: "#a94174" },
      { name: "パープル", group: "ピンク/レッド", hex: "#a854a4" },
      { name: "ペールピンク", group: "ピンク/レッド", hex: "#e8cfde" },
      { name: "コーラルピンク", group: "ピンク/レッド", hex: "#f0a180" }
    ];

    const GROUPS = ["すべて", ...new Set(COLORS.map((c) => c.group))];

    const state = {
      dogColor: COLORS.find((c) => c.name === "ネイビー") || COLORS[0],
      boneColor: COLORS.find((c) => c.name === "ライムイエロー") || COLORS[0],
      dogGroup: "すべて",
      boneGroup: "すべて",
      metal: "silver"
    };

    const canvas = document.getElementById("previewCanvas");
    const ctx = canvas.getContext("2d", { willReadFrequently: true });
    const loadingEl = document.getElementById("loading");
    const summaryEl = document.getElementById("summary");

    const dogGroupEl = document.getElementById("dogGroup");
    const boneGroupEl = document.getElementById("boneGroup");
    const dogSwatchesEl = document.getElementById("dogSwatches");
    const boneSwatchesEl = document.getElementById("boneSwatches");
    const metalSilverBtn = document.getElementById("metalSilver");
    const metalGoldBtn = document.getElementById("metalGold");

    const baseImage = new Image();
    const offscreen = document.createElement("canvas");
    const offCtx = offscreen.getContext("2d", { willReadFrequently: true });
    const grainSourceImage = new Image();
    const grainPatchCanvas = document.createElement("canvas");
    const grainPatchCtx = grainPatchCanvas.getContext("2d", { willReadFrequently: true });
    const silverRingImage = new Image();
    const goldRingImage = new Image();

    let baseData = null;
    let dogMask = null;
    let boneMask = null;
    let metalMask = null;
    let stitchDogMask = null;
    let stitchBoneMask = null;
    let grainPatchData = null;
    let grainPatchWidth = 0;
    let grainPatchHeight = 0;
    let grainMap = null;
    let grainEmbossMap = null;
    let silverRingAsset = null;
    let goldRingAsset = null;
    let colorAreaBounds = null;
    let imageReady = false;

    function clamp(v, min = 0, max = 255) {
      return Math.max(min, Math.min(max, v));
    }

    function hexToRgb(hex) {
      const normalized = hex.replace("#", "");
      const bigint = Number.parseInt(normalized, 16);
      return {
        r: (bigint >> 16) & 255,
        g: (bigint >> 8) & 255,
        b: bigint & 255
      };
    }

    function rgbToHsv(r, g, b) {
      const nr = r / 255;
      const ng = g / 255;
      const nb = b / 255;
      const max = Math.max(nr, ng, nb);
      const min = Math.min(nr, ng, nb);
      const d = max - min;
      let h = 0;
      if (d) {
        if (max === nr) h = ((ng - nb) / d) % 6;
        else if (max === ng) h = (nb - nr) / d + 2;
        else h = (nr - ng) / d + 4;
      }
      h = Math.round(h * 60);
      if (h < 0) h += 360;
      const s = max === 0 ? 0 : d / max;
      const v = max;
      return { h, s, v };
    }

    function buildGroupOptions(selectEl) {
      selectEl.innerHTML = "";
      for (const group of GROUPS) {
        const option = document.createElement("option");
        option.value = group;
        option.textContent = group;
        selectEl.appendChild(option);
      }
    }

    function colorsInGroup(group) {
      if (group === "すべて") return COLORS;
      return COLORS.filter((color) => color.group === group);
    }

    function buildSwatches(container, group, selectedName, onClick) {
      container.innerHTML = "";
      const rows = colorsInGroup(group);
      for (const color of rows) {
        const button = document.createElement("button");
        button.type = "button";
        button.className = "swatch" + (color.name === selectedName ? " active" : "");
        button.style.background = color.hex;
        button.title = color.name;
        button.setAttribute("aria-label", color.name);
        button.addEventListener("click", () => onClick(color));
        container.appendChild(button);
      }
    }

    function updateSummary() {
      const metalName = state.metal === "silver" ? "シルバー" : "ゴールド";
      summaryEl.textContent =
        `現在の組み合わせ: ドーナツ「${state.dogColor.name}」 / キャンディ「${state.boneColor.name}」 / 金具「${metalName}」。`;
    }

    function positiveMod(value, mod) {
      const n = value % mod;
      return n < 0 ? n + mod : n;
    }

    function loadLeatherPatch() {
      grainSourceImage.src = "ブラウン系.jpg";
      grainSourceImage.onload = () => {
        const srcW = grainSourceImage.naturalWidth;
        const srcH = grainSourceImage.naturalHeight;
        const sx = Math.floor(srcW * 0.06);
        const sy = Math.floor(srcH * 0.06);
        const sw = Math.max(120, Math.floor(srcW * 0.20));
        const sh = Math.max(120, Math.floor(srcH * 0.20));

        grainPatchWidth = 200;
        grainPatchHeight = 200;
        grainPatchCanvas.width = grainPatchWidth;
        grainPatchCanvas.height = grainPatchHeight;
        grainPatchCtx.drawImage(grainSourceImage, sx, sy, sw, sh, 0, 0, grainPatchWidth, grainPatchHeight);
        grainPatchData = grainPatchCtx.getImageData(0, 0, grainPatchWidth, grainPatchHeight).data;

        if (imageReady) {
          buildLeatherGrainMap(offscreen.width, offscreen.height);
          render();
        }
      };
    }

    function buildLeatherGrainMap(width, height) {
      grainMap = new Float32Array(width * height);
      grainEmbossMap = new Float32Array(width * height);

      const hasPatch = !!(grainPatchData && grainPatchWidth > 0 && grainPatchHeight > 0);

      for (let y = 0; y < height; y += 1) {
        for (let x = 0; x < width; x += 1) {
          const idx = y * width + x;

          if (hasPatch) {
            const sx1 = positiveMod((x * 0.95 + y * 0.19) | 0, grainPatchWidth);
            const sy1 = positiveMod((y * 0.92 - x * 0.13) | 0, grainPatchHeight);
            const sx2 = positiveMod((x * 1.43 - y * 0.22) | 0, grainPatchWidth);
            const sy2 = positiveMod((y * 1.31 + x * 0.17) | 0, grainPatchHeight);

            const i1 = (sy1 * grainPatchWidth + sx1) * 4;
            const i2 = (sy2 * grainPatchWidth + sx2) * 4;
            const lum1 = (grainPatchData[i1] * 0.22 + grainPatchData[i1 + 1] * 0.61 + grainPatchData[i1 + 2] * 0.17) / 255;
            const lum2 = (grainPatchData[i2] * 0.22 + grainPatchData[i2 + 1] * 0.61 + grainPatchData[i2 + 2] * 0.17) / 255;

            const center1 = lum1 - 0.5;
            const center2 = lum2 - 0.5;
            const pebble = (1 - Math.abs(center1 * 2)) - 0.5;
            grainMap[idx] = center1 * 0.92 + center2 * 0.48 + pebble * 0.44;
          } else {
            const n1 = Math.sin(x * 0.081 + y * 0.053);
            const n2 = Math.cos(x * 0.132 - y * 0.119);
            const n3 = Math.sin((x + y) * 0.27);
            grainMap[idx] = n1 * 0.23 + n2 * 0.17 + n3 * 0.09;
          }
        }
      }

      for (let y = 1; y < height - 1; y += 1) {
        for (let x = 1; x < width - 1; x += 1) {
          const idx = y * width + x;
          const gx = grainMap[idx + 1] - grainMap[idx - 1];
          const gy = grainMap[idx + width] - grainMap[idx - width];
          grainEmbossMap[idx] = gx * 0.72 + gy * 0.54;
        }
      }
    }

    function computeMaskBounds(mask, width, height) {
      let minX = width;
      let minY = height;
      let maxX = -1;
      let maxY = -1;

      for (let y = 0; y < height; y += 1) {
        for (let x = 0; x < width; x += 1) {
          const idx = y * width + x;
          if (!mask[idx]) continue;
          if (x < minX) minX = x;
          if (y < minY) minY = y;
          if (x > maxX) maxX = x;
          if (y > maxY) maxY = y;
        }
      }

      if (maxX < minX || maxY < minY) return null;
      return { x: minX, y: minY, w: maxX - minX + 1, h: maxY - minY + 1 };
    }

    function mergeBounds(a, b) {
      if (!a && !b) return null;
      if (!a) return b;
      if (!b) return a;
      const x = Math.min(a.x, b.x);
      const y = Math.min(a.y, b.y);
      const maxX = Math.max(a.x + a.w, b.x + b.w);
      const maxY = Math.max(a.y + a.h, b.y + b.h);
      return { x, y, w: maxX - x, h: maxY - y };
    }

    function extractKeyRingAsset(image) {
      const workCanvas = document.createElement("canvas");
      const workCtx = workCanvas.getContext("2d", { willReadFrequently: true });
      workCanvas.width = image.naturalWidth;
      workCanvas.height = image.naturalHeight;
      workCtx.drawImage(image, 0, 0);
      const img = workCtx.getImageData(0, 0, workCanvas.width, workCanvas.height);
      const data = img.data;

      const corners = [
        [1, 1],
        [workCanvas.width - 2, 1],
        [1, workCanvas.height - 2],
        [workCanvas.width - 2, workCanvas.height - 2]
      ];
      let bgR = 0;
      let bgG = 0;
      let bgB = 0;
      for (const [cx, cy] of corners) {
        const ci = (cy * workCanvas.width + cx) * 4;
        bgR += data[ci];
        bgG += data[ci + 1];
        bgB += data[ci + 2];
      }
      bgR /= corners.length;
      bgG /= corners.length;
      bgB /= corners.length;

      let minX = workCanvas.width;
      let minY = workCanvas.height;
      let maxX = -1;
      let maxY = -1;

      for (let y = 0; y < workCanvas.height; y += 1) {
        for (let x = 0; x < workCanvas.width; x += 1) {
          const i = (y * workCanvas.width + x) * 4;
          const dr = data[i] - bgR;
          const dg = data[i + 1] - bgG;
          const db = data[i + 2] - bgB;
          const dist = Math.sqrt(dr * dr + dg * dg + db * db);

          if (dist < 12) {
            data[i + 3] = 0;
          } else if (dist < 28) {
            data[i + 3] = Math.round((dist - 12) / 16 * 255);
          } else {
            data[i + 3] = 255;
            if (x < minX) minX = x;
            if (y < minY) minY = y;
            if (x > maxX) maxX = x;
            if (y > maxY) maxY = y;
          }
        }
      }
      workCtx.putImageData(img, 0, 0);

      if (maxX < minX || maxY < minY) return null;

      const pad = 4;
      const sx = Math.max(0, minX - pad);
      const sy = Math.max(0, minY - pad);
      const sw = Math.min(workCanvas.width - sx, maxX - minX + 1 + pad * 2);
      const sh = Math.min(workCanvas.height - sy, maxY - minY + 1 + pad * 2);

      const out = document.createElement("canvas");
      const outCtx = out.getContext("2d");
      out.width = sw;
      out.height = sh;
      outCtx.drawImage(workCanvas, sx, sy, sw, sh, 0, 0, sw, sh);
      return out;
    }

    function loadKeyRingAssets() {
      silverRingImage.src = "シルバーキーリング.jpg";
      goldRingImage.src = "ゴールドキーリング.jpg";

      silverRingImage.onload = () => {
        silverRingAsset = extractKeyRingAsset(silverRingImage);
        if (imageReady) render();
      };
      silverRingImage.onerror = () => {
        silverRingAsset = null;
        if (imageReady) render();
      };
      goldRingImage.onload = () => {
        goldRingAsset = extractKeyRingAsset(goldRingImage);
        if (imageReady) render();
      };
      goldRingImage.onerror = () => {
        goldRingAsset = null;
        if (imageReady) render();
      };
    }

    function classifyMasks(imageData, width, height) {
      const src = imageData.data;
      dogMask = new Uint8Array(width * height);
      boneMask = new Uint8Array(width * height);
      metalMask = new Uint8Array(width * height);
      stitchDogMask = new Uint8Array(width * height);
      stitchBoneMask = new Uint8Array(width * height);
      let dogCount = 0;
      let boneCount = 0;

      for (let y = 0; y < height; y += 1) {
        for (let x = 0; x < width; x += 1) {
          const i = (y * width + x) * 4;
          const r = src[i];
          const g = src[i + 1];
          const b = src[i + 2];
          const hsv = rgbToHsv(r, g, b);
          const satSpread = Math.max(r, g, b) - Math.min(r, g, b);

          const inMainArea = x > width * 0.16 && x < width * 0.84 && y > height * 0.12 && y < height * 0.95;
          const isBackground = r > 222 && g > 222 && b > 222 && satSpread < 23;

          if (!inMainArea || isBackground) {
            continue;
          }

          const idx = y * width + x;

          const isDog =
            y > height * 0.18 &&
            y < height * 0.68 &&
            x > width * 0.17 &&
            x < width * 0.76 &&
            hsv.v < 0.42 &&
            hsv.s > 0.12 &&
            satSpread > 15;

          const isBone =
            y > height * 0.32 &&
            x > width * 0.26 &&
            x < width * 0.8 &&
            hsv.h > 35 &&
            hsv.h < 76 &&
            hsv.s > 0.2 &&
            hsv.v > 0.36;

          const isMetal =
            y < height * 0.54 &&
            x > width * 0.24 &&
            x < width * 0.72 &&
            hsv.s < 0.35 &&
            hsv.v > 0.28 &&
            hsv.v < 0.93 &&
            satSpread < 80;

          if (isDog) {
            dogMask[idx] = 1;
            dogCount += 1;
          } else if (isBone) {
            boneMask[idx] = 1;
            boneCount += 1;
          } else if (isMetal) {
            metalMask[idx] = 1;
          }
        }
      }

      const area = width * height;
      let usedLineFittedMask = false;
      if (dogCount < area * 0.01 && boneCount < area * 0.015) {
        usedLineFittedMask = applyDonutCandyMasks(width, height, src);
      }

      if (!usedLineFittedMask) {
        smoothMask(dogMask, width, height, 2);
        smoothMask(boneMask, width, height, 2);
      }
      smoothMask(metalMask, width, height, 2);
      const dogBounds = computeMaskBounds(dogMask, width, height);
      const boneBounds = computeMaskBounds(boneMask, width, height);
      colorAreaBounds = mergeBounds(dogBounds, boneBounds);
      buildInternalStitchMasks(src, width, height);
    }

    function lerp(a, b, t) {
      return a + (b - a) * t;
    }

    function candyHalfWidthByT(t) {
      if (t < 0.12) return lerp(0.028, 0.102, t / 0.12);
      if (t < 0.28) return lerp(0.102, 0.058, (t - 0.12) / 0.16);
      if (t < 0.50) return lerp(0.058, 0.094, (t - 0.28) / 0.22);
      if (t < 0.72) return lerp(0.094, 0.058, (t - 0.50) / 0.22);
      if (t < 0.88) return lerp(0.058, 0.102, (t - 0.72) / 0.16);
      return lerp(0.102, 0.028, (t - 0.88) / 0.12);
    }

    function buildLineBarrier(src, width, height) {
      const barrier = new Uint8Array(width * height);
      for (let idx = 0; idx < barrier.length; idx += 1) {
        const i = idx * 4;
        const r = src[i];
        const g = src[i + 1];
        const b = src[i + 2];
        const lum = 0.2126 * r + 0.7152 * g + 0.0722 * b;
        const spread = Math.max(r, g, b) - Math.min(r, g, b);
        const darkInk = lum < 162 && spread < 44;
        const antialiasInk = lum < 195 && spread < 26 && r < 206 && g < 206 && b < 206;
        if (darkInk || antialiasInk) {
          barrier[idx] = 1;
        }
      }
      return barrier;
    }

    function markOutsideArea(barrier, width, height) {
      const outside = new Uint8Array(width * height);
      const queue = new Int32Array(width * height);
      let head = 0;
      let tail = 0;

      function enqueue(idx) {
        if (!outside[idx] && !barrier[idx]) {
          outside[idx] = 1;
          queue[tail] = idx;
          tail += 1;
        }
      }

      for (let x = 0; x < width; x += 1) {
        enqueue(x);
        enqueue((height - 1) * width + x);
      }
      for (let y = 1; y < height - 1; y += 1) {
        enqueue(y * width);
        enqueue(y * width + (width - 1));
      }

      while (head < tail) {
        const idx = queue[head];
        head += 1;
        const x = idx % width;
        const y = (idx / width) | 0;

        if (x > 0) enqueue(idx - 1);
        if (x < width - 1) enqueue(idx + 1);
        if (y > 0) enqueue(idx - width);
        if (y < height - 1) enqueue(idx + width);
      }

      return outside;
    }

    function findEnclosedSeed(anchorX, anchorY, width, height, barrier, outside) {
      const cx = Math.round(anchorX * width);
      const cy = Math.round(anchorY * height);
      const maxRadius = Math.ceil(Math.max(width, height) * 0.09);

      for (let radius = 0; radius <= maxRadius; radius += 1) {
        const minX = Math.max(1, cx - radius);
        const maxX = Math.min(width - 2, cx + radius);
        const minY = Math.max(1, cy - radius);
        const maxY = Math.min(height - 2, cy + radius);

        for (let x = minX; x <= maxX; x += 1) {
          const topIdx = minY * width + x;
          if (!barrier[topIdx] && !outside[topIdx]) return topIdx;
          const bottomIdx = maxY * width + x;
          if (!barrier[bottomIdx] && !outside[bottomIdx]) return bottomIdx;
        }
        for (let y = minY + 1; y < maxY; y += 1) {
          const leftIdx = y * width + minX;
          if (!barrier[leftIdx] && !outside[leftIdx]) return leftIdx;
          const rightIdx = y * width + maxX;
          if (!barrier[rightIdx] && !outside[rightIdx]) return rightIdx;
        }
      }
      return -1;
    }

    function floodFillRegion(seedIdx, width, height, barrier, outside, targetMask) {
      if (seedIdx < 0 || barrier[seedIdx] || outside[seedIdx]) return 0;

      const queue = new Int32Array(width * height);
      let head = 0;
      let tail = 0;
      let count = 0;

      queue[tail] = seedIdx;
      tail += 1;
      outside[seedIdx] = 1;

      while (head < tail) {
        const idx = queue[head];
        head += 1;
        targetMask[idx] = 1;
        count += 1;

        const x = idx % width;
        const y = (idx / width) | 0;

        if (x > 0) {
          const left = idx - 1;
          if (!barrier[left] && !outside[left]) {
            outside[left] = 1;
            queue[tail] = left;
            tail += 1;
          }
        }
        if (x < width - 1) {
          const right = idx + 1;
          if (!barrier[right] && !outside[right]) {
            outside[right] = 1;
            queue[tail] = right;
            tail += 1;
          }
        }
        if (y > 0) {
          const up = idx - width;
          if (!barrier[up] && !outside[up]) {
            outside[up] = 1;
            queue[tail] = up;
            tail += 1;
          }
        }
        if (y < height - 1) {
          const down = idx + width;
          if (!barrier[down] && !outside[down]) {
            outside[down] = 1;
            queue[tail] = down;
            tail += 1;
          }
        }
      }

      return count;
    }

    function applyApproxDonutCandyMasks(width, height, barrier) {
      for (let y = 0; y < height; y += 1) {
        const ny = (y + 0.5) / height;
        for (let x = 0; x < width; x += 1) {
          const nx = (x + 0.5) / width;
          const idx = y * width + x;

          if (barrier[idx]) {
            continue;
          }

          const dx = (nx - 0.332) / 0.172;
          const dy = (ny - 0.620) / 0.154;
          const radius = Math.sqrt(dx * dx + dy * dy);
          const angle = Math.atan2(dy, dx);
          const outerWave = 0.965 + 0.018 * Math.sin(angle * 6);
          const innerWave = 0.372 + 0.014 * Math.sin((angle + 0.8) * 4);
          const inDonut =
            nx > 0.13 &&
            nx < 0.55 &&
            ny > 0.45 &&
            ny < 0.80 &&
            radius < outerWave &&
            radius > innerWave;

          let inCandy = false;
          if (ny >= 0.45 && ny <= 0.83) {
            const t = (ny - 0.45) / 0.38;
            const halfWidth = Math.max(0, candyHalfWidthByT(t) * 0.76 - 0.010);
            inCandy = Math.abs(nx - 0.698) < halfWidth;
          }

          if (inDonut) {
            dogMask[idx] = 1;
          } else if (inCandy) {
            boneMask[idx] = 1;
          }
        }
      }
    }

    function insetMaskFromBarrier(mask, barrier, width, height, passes) {
      for (let pass = 0; pass < passes; pass += 1) {
        const copy = mask.slice();
        for (let y = 1; y < height - 1; y += 1) {
          for (let x = 1; x < width - 1; x += 1) {
            const idx = y * width + x;
            if (!copy[idx]) continue;
            if (
              barrier[idx] ||
              barrier[idx - 1] ||
              barrier[idx + 1] ||
              barrier[idx - width] ||
              barrier[idx + width]
            ) {
              mask[idx] = 0;
            }
          }
        }
      }
    }

    function applyDonutCandyMasks(width, height, src) {
      dogMask.fill(0);
      boneMask.fill(0);
      const barrier = buildLineBarrier(src, width, height);
      const outside = markOutsideArea(barrier, width, height);

      const donutSeed = findEnclosedSeed(0.434, 0.620, width, height, barrier, outside);
      const candySeed = findEnclosedSeed(0.698, 0.640, width, height, barrier, outside);
      const donutSize = floodFillRegion(donutSeed, width, height, barrier, outside, dogMask);
      const candySize = floodFillRegion(candySeed, width, height, barrier, outside, boneMask);

      const area = width * height;
      if (donutSize < area * 0.01 || candySize < area * 0.01) {
        dogMask.fill(0);
        boneMask.fill(0);
        applyApproxDonutCandyMasks(width, height, barrier);
      }

      insetMaskFromBarrier(dogMask, barrier, width, height, 2);
      insetMaskFromBarrier(boneMask, barrier, width, height, 2);
      return true;
    }

    function isStitchLikePixel(src, width, height, x, y, relaxed = false) {
      const idx = y * width + x;
      const i = idx * 4;
      const r = src[i];
      const g = src[i + 1];
      const b = src[i + 2];
      const lum = 0.2126 * r + 0.7152 * g + 0.0722 * b;
      const spread = Math.max(r, g, b) - Math.min(r, g, b);
      const neutralLimit = relaxed ? 72 : 56;
      const lowLum = relaxed ? 26 : 34;
      const highLum = relaxed ? 246 : 242;
      if (spread > neutralLimit || lum < lowLum || lum > highLum) {
        return false;
      }
      if (x <= 0 || x >= width - 1 || y <= 0 || y >= height - 1) {
        return true;
      }

      const left = (y * width + (x - 1)) * 4;
      const right = (y * width + (x + 1)) * 4;
      const up = ((y - 1) * width + x) * 4;
      const down = ((y + 1) * width + x) * 4;
      const lumLeft = 0.2126 * src[left] + 0.7152 * src[left + 1] + 0.0722 * src[left + 2];
      const lumRight = 0.2126 * src[right] + 0.7152 * src[right + 1] + 0.0722 * src[right + 2];
      const lumUp = 0.2126 * src[up] + 0.7152 * src[up + 1] + 0.0722 * src[up + 2];
      const lumDown = 0.2126 * src[down] + 0.7152 * src[down + 1] + 0.0722 * src[down + 2];
      const local = (lumLeft + lumRight + lumUp + lumDown) / 4;
      const contrast = Math.abs(lum - local);
      return contrast > (relaxed ? 3.4 : 6.2);
    }

    function buildInternalStitchMasks(src, width, height) {
      stitchDogMask.fill(0);
      stitchBoneMask.fill(0);
      let dogCount = 0;
      let boneCount = 0;

      for (let y = 0; y < height; y += 1) {
        const ny = (y + 0.5) / height;
        for (let x = 0; x < width; x += 1) {
          const idx = y * width + x;
          const nx = (x + 0.5) / width;
          if (dogMask[idx]) {
            const dx = (nx - 0.332) / 0.172;
            const dy = (ny - 0.620) / 0.154;
            const radius = Math.sqrt(dx * dx + dy * dy);
            const inDonutWindow = nx > 0.14 && nx < 0.54 && ny > 0.46 && ny < 0.79;
            const nearOuterStitch = Math.abs(radius - 0.875) < 0.048;
            const nearInnerStitch = Math.abs(radius - 0.440) < 0.040;
            if (inDonutWindow && (nearOuterStitch || nearInnerStitch) && isStitchLikePixel(src, width, height, x, y, false)) {
              stitchDogMask[idx] = 1;
              dogCount += 1;
              continue;
            }
          }

          if (boneMask[idx] && ny >= 0.45 && ny <= 0.83 && nx > 0.60 && nx < 0.80) {
            const t = (ny - 0.45) / 0.38;
            if (t >= 0 && t <= 1) {
              const halfWidth = Math.max(0, candyHalfWidthByT(t) * 0.76 - 0.010);
              const stitchOffset = Math.max(0, halfWidth - 0.020);
              const edgeDistance = Math.abs(Math.abs(nx - 0.698) - stitchOffset);
              const tolerance = 0.010 + halfWidth * 0.06;
              if (edgeDistance <= tolerance && isStitchLikePixel(src, width, height, x, y, false)) {
                stitchBoneMask[idx] = 1;
                boneCount += 1;
              }
            }
          }
        }
      }

      if (dogCount < 120 || boneCount < 80) {
        for (let y = 0; y < height; y += 1) {
          const ny = (y + 0.5) / height;
          for (let x = 0; x < width; x += 1) {
            const idx = y * width + x;
            const nx = (x + 0.5) / width;

            if (dogMask[idx] && !stitchDogMask[idx] && dogCount < 120) {
              const dx = (nx - 0.332) / 0.172;
              const dy = (ny - 0.620) / 0.154;
              const radius = Math.sqrt(dx * dx + dy * dy);
              const inDonutWindow = nx > 0.14 && nx < 0.54 && ny > 0.46 && ny < 0.79;
              const nearOuterStitch = Math.abs(radius - 0.875) < 0.058;
              const nearInnerStitch = Math.abs(radius - 0.440) < 0.050;
              if (inDonutWindow && (nearOuterStitch || nearInnerStitch) && isStitchLikePixel(src, width, height, x, y, true)) {
                stitchDogMask[idx] = 1;
                dogCount += 1;
              }
            }

            if (boneMask[idx] && !stitchBoneMask[idx] && boneCount < 80 && ny >= 0.45 && ny <= 0.83 && nx > 0.60 && nx < 0.80) {
              const t = (ny - 0.45) / 0.38;
              if (t >= 0 && t <= 1) {
                const halfWidth = Math.max(0, candyHalfWidthByT(t) * 0.76 - 0.010);
                const stitchOffset = Math.max(0, halfWidth - 0.020);
                const edgeDistance = Math.abs(Math.abs(nx - 0.698) - stitchOffset);
                const tolerance = 0.012 + halfWidth * 0.08;
                if (edgeDistance <= tolerance && isStitchLikePixel(src, width, height, x, y, true)) {
                  stitchBoneMask[idx] = 1;
                  boneCount += 1;
                }
              }
            }
          }
        }
      }

      removeIsolatedStitchPixels(stitchDogMask, width, height);
      removeIsolatedStitchPixels(stitchBoneMask, width, height);
    }

    function removeIsolatedStitchPixels(mask, width, height) {
      const copy = mask.slice();
      for (let y = 1; y < height - 1; y += 1) {
        for (let x = 1; x < width - 1; x += 1) {
          const idx = y * width + x;
          if (!copy[idx]) continue;
          let neighbors = 0;
          for (let oy = -1; oy <= 1; oy += 1) {
            for (let ox = -1; ox <= 1; ox += 1) {
              if (ox === 0 && oy === 0) continue;
              neighbors += copy[(y + oy) * width + (x + ox)];
            }
          }
          if (neighbors <= 1) {
            mask[idx] = 0;
          }
        }
      }
    }

    function smoothMask(mask, width, height, rounds) {
      for (let round = 0; round < rounds; round += 1) {
        const copy = mask.slice();
        for (let y = 1; y < height - 1; y += 1) {
          for (let x = 1; x < width - 1; x += 1) {
            const idx = y * width + x;
            let sum = 0;
            for (let oy = -1; oy <= 1; oy += 1) {
              for (let ox = -1; ox <= 1; ox += 1) {
                sum += copy[(y + oy) * width + (x + ox)];
              }
            }
            if (sum >= 5) mask[idx] = 1;
            if (sum <= 2) mask[idx] = 0;
          }
        }
      }
    }

    function leatherTone(base, target, idx) {
      const lum = (0.2126 * base.r + 0.7152 * base.g + 0.0722 * base.b) / 255;
      const spread = (Math.max(base.r, base.g, base.b) - Math.min(base.r, base.g, base.b)) / 255;
      const grain = grainMap ? grainMap[idx] : 0;
      const emboss = grainEmbossMap ? grainEmbossMap[idx] : 0;
      const factor = 0.82 + lum * 0.22 + spread * 0.08 + grain * 0.22;
      const lift = grain * 11;
      const bump = emboss * 9;
      return {
        r: clamp(target.r * factor + lift * 0.42 + bump),
        g: clamp(target.g * factor + lift * 0.32 + bump * 0.82),
        b: clamp(target.b * factor - lift * 0.18 - bump * 0.58)
      };
    }

    function metalTone(base, mode) {
      const lum = (0.2126 * base.r + 0.7152 * base.g + 0.0722 * base.b) / 255;
      const highlight = mode === "silver"
        ? { r: 243, g: 246, b: 252 }
        : { r: 236, g: 223, b: 192 };
      const shadow = mode === "silver"
        ? { r: 109, g: 118, b: 130 }
        : { r: 117, g: 100, b: 72 };
      const mix = 0.18 + lum * 0.82;
      let r = shadow.r * (1 - mix) + highlight.r * mix;
      let g = shadow.g * (1 - mix) + highlight.g * mix;
      let b = shadow.b * (1 - mix) + highlight.b * mix;

      if (mode === "gold") {
        const mute = 0.14;
        const gray = (r + g + b) / 3;
        r = r * (1 - mute) + gray * mute;
        g = g * (1 - mute) + gray * mute;
        b = b * (1 - mute) + gray * mute;
      }
      return { r: clamp(r), g: clamp(g), b: clamp(b) };
    }

    function drawSelectedKeyRing(width, height) {
      const asset = state.metal === "silver" ? silverRingAsset : goldRingAsset;
      if (!asset) return;

      const margin = Math.max(8, Math.round(Math.min(width, height) * 0.012));
      const topLimit = colorAreaBounds
        ? Math.max(margin * 2, colorAreaBounds.y - margin)
        : Math.round(height * 0.24);
      const maxDrawHeight = topLimit - margin;
      if (maxDrawHeight < 20) return;

      const maxDrawWidth = Math.round(width * 0.34);
      const scale = Math.min(
        maxDrawWidth / asset.width,
        maxDrawHeight / asset.height
      );
      const drawW = Math.max(24, Math.round(asset.width * scale));
      const drawH = Math.max(20, Math.round(asset.height * scale));

      const targetX = Math.round((width - drawW) / 2);
      let targetY = Math.round((topLimit - drawH) / 2);
      targetY = Math.max(margin, targetY);
      if (targetY + drawH > topLimit) {
        targetY = Math.max(margin, topLimit - drawH);
      }

      ctx.drawImage(asset, targetX, targetY, drawW, drawH);
    }

    function stitchPixelTone(base) {
      const lum = (0.2126 * base.r + 0.7152 * base.g + 0.0722 * base.b) / 255;
      const tone = 6 + lum * 14;
      return { r: clamp(tone), g: clamp(tone), b: clamp(tone + 1) };
    }

    function render() {
      if (!imageReady || !baseData) return;

      const width = offscreen.width;
      const height = offscreen.height;
      const src = baseData.data;
      const out = new ImageData(width, height);
      const dst = out.data;
      const dogTarget = hexToRgb(state.dogColor.hex);
      const boneTarget = hexToRgb(state.boneColor.hex);
      const hasRingAsset = state.metal === "silver" ? !!silverRingAsset : !!goldRingAsset;

      for (let idx = 0; idx < dogMask.length; idx += 1) {
        const i = idx * 4;
        const base = { r: src[i], g: src[i + 1], b: src[i + 2] };
        let result = { ...base };

        if (dogMask[idx]) {
          result = leatherTone(base, dogTarget, idx);
        } else if (boneMask[idx]) {
          result = leatherTone(base, boneTarget, idx);
        } else if (metalMask[idx]) {
          result = metalTone(base, state.metal);
        }

        if (stitchDogMask[idx] || stitchBoneMask[idx]) {
          result = stitchPixelTone(base);
        }

        dst[i] = result.r;
        dst[i + 1] = result.g;
        dst[i + 2] = result.b;
        dst[i + 3] = src[i + 3];
      }

      ctx.putImageData(out, 0, 0);
      if (hasRingAsset && colorAreaBounds) {
        drawSelectedKeyRing(width, height);
      }
    }

    function initControls() {
      buildGroupOptions(dogGroupEl);
      buildGroupOptions(boneGroupEl);
      dogGroupEl.value = state.dogGroup;
      boneGroupEl.value = state.boneGroup;

      function rerenderSwatches() {
        buildSwatches(dogSwatchesEl, state.dogGroup, state.dogColor.name, (color) => {
          state.dogColor = color;
          rerenderSwatches();
          updateSummary();
          render();
        });
        buildSwatches(boneSwatchesEl, state.boneGroup, state.boneColor.name, (color) => {
          state.boneColor = color;
          rerenderSwatches();
          updateSummary();
          render();
        });
      }

      dogGroupEl.addEventListener("change", () => {
        state.dogGroup = dogGroupEl.value;
        rerenderSwatches();
      });
      boneGroupEl.addEventListener("change", () => {
        state.boneGroup = boneGroupEl.value;
        rerenderSwatches();
      });

      metalSilverBtn.addEventListener("click", () => {
        state.metal = "silver";
        metalSilverBtn.classList.add("active");
        metalGoldBtn.classList.remove("active");
        updateSummary();
        render();
      });

      metalGoldBtn.addEventListener("click", () => {
        state.metal = "gold";
        metalGoldBtn.classList.add("active");
        metalSilverBtn.classList.remove("active");
        updateSummary();
        render();
      });

      rerenderSwatches();
      updateSummary();
    }

    function initImage() {
      baseImage.src = "ドーナツ2.jpg";
      baseImage.onload = () => {
        offscreen.width = baseImage.naturalWidth;
        offscreen.height = baseImage.naturalHeight;
        canvas.width = baseImage.naturalWidth;
        canvas.height = baseImage.naturalHeight;
        offCtx.drawImage(baseImage, 0, 0);
        baseData = offCtx.getImageData(0, 0, offscreen.width, offscreen.height);
        classifyMasks(baseData, offscreen.width, offscreen.height);
        buildLeatherGrainMap(offscreen.width, offscreen.height);
        imageReady = true;
        loadingEl.style.display = "none";
        render();
      };
      baseImage.onerror = () => {
        loadingEl.textContent = "画像の読み込みに失敗しました。ファイル名をご確認ください。";
      };
    }

    initControls();
    loadLeatherPatch();
    loadKeyRingAssets();
    initImage();
  </script>
</body>
